<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>LeetCode JavaScript 题解</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="LeetCode JavaScript题解集合" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    />
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css"
      title="docsify-darklight-theme"
      type="text/css"
    />
    <style>
      :root {
        --theme-color: #42b983;
      }
      /* 修复 docsify-darklight-theme 在某些情况下侧边栏的显示问题 */
      .sidebar {
        z-index: 20;
      }
      #docsify-darklight-theme {
        right: 15px;
        bottom: 70px;
      }
      .markdown-section {
        max-width: 1000px;
        padding: 30px 15px 40px 15px;
      }
      code {
        border-radius: 4px;
      }
      .sidebar {
        width: 300px;
      }
      body.close .sidebar {
        transform: translateX(-300px);
      }
      @media screen and (max-width: 768px) {
        .sidebar {
          width: 250px;
        }
        body.close .sidebar {
          transform: translateX(-250px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        name: "LeetCode JavaScript 题解",
        repo: "skypesky/leetcode-for-javascript",
        corner: {
          url: "https://github.com/skypesky/leetcode-for-javascript",
          icon: "github",
        },
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索题解...",
          noData: "找不到相关题解",
        },
        copyCode: {
          buttonText: "复制",
          errorText: "错误",
          successText: "已复制",
        },
        pagination: {
          previousText: "上一题",
          nextText: "下一题",
          crossChapter: true,
          crossChapterText: true,
        },
        darklightTheme: {
          defaultTheme: "light",
          siteFont: "PT Sans",
          codeFontFamily: "Roboto Mono, Monaco, courier, monospace",
          bodyFontSize: "15px",
          dark: {
            background: "#1c2022",
            toggleBtnBg: "#34495e",
            textColor: "#e6e6e6",
            codeColor: "#f8f8f2",
          },
          light: {
            background: "white",
            toggleBtnBg: "#42b983",
            textColor: "#2c3e50",
            codeColor: "#2c3e50",
          },
        },
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script
      src="//cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js"
      type="text/javascript"
    ></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-javascript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-typescript.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  </body>
</html>
